name: Escaneo de secretos (gitleaks)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks escanea todo el historial recibido en este checkout, no
          # solo el último commit — fetch-depth 0 trae el historial completo
          # para detectar un secreto commiteado y luego "borrado" en un commit
          # posterior (que sigue expuesto en el historial de git).
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
