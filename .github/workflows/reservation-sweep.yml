name: Barrido de reservas vencidas

# Libera lugares reservados por transferencia que vencieron sin pago
# confirmado y los ofrece a la lista de espera (ver scripts/sweep-reservations.mjs).
# Cada 10 min, con offset (3,13,23…) para no caer justo en el pico de cron
# jobs de :00 de todo GitHub Actions — mismo criterio que ya usan
# firestore-backup.yml y uptime-check.yml.
on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm ci

      - name: Barrer reservas vencidas y promover lista de espera
        run: node scripts/sweep-reservations.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_APP_PASES_9E6E7: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_PASES_9E6E7 }}
